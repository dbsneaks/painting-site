backend:
  name: github
  repo: dbsneaks/painting-site
  branch: main
  base_url: https://somepaintingsipainted.com
  auth_endpoint: api/auth

media_folder: "images/paintings"
public_folder: "/images/paintings"

collections:
  - name: "paintings"
    label: "Paintings"
    files:
      - name: "paintings-data"
        label: "Paintings Database"
        file: "paintings.json"
        fields:
          - label: "Paintings"
            name: "paintings"
            widget: "list"
            fields:
              - {label: "ID", name: "id", widget: "number"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Image", name: "image", widget: "image"}
              - label: "Additional Images"
                name: "images"
                widget: "list"
                field: {label: "Image", name: "image", widget: "image"}
              - {label: "Sold", name: "sold", widget: "boolean", default: false}
              - {label: "Blurb", name: "blurb", widget: "text", required: false}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Size", name: "size", widget: "string"}
              - {label: "Medium", name: "medium", widget: "string"}
              - {label: "Price", name: "price", widget: "string", required: false}
              - label: "Theme"
                name: "theme"
                widget: "select"
                options: ["flowers", "animals", "food", "people", "structures", "water"]
